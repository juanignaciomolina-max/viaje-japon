<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --red: #e63946;
  --gold: #ffd700;
  --cyan: #00e5ff;
  --white: #fff;
  --bg: #0a0a1a;
  --bg2: #12122a;
  --font-ja: 'Noto Sans JP', sans-serif;
  --font-display: 'Rampart One', cursive;
  --font-pop: 'Mochiy Pop One', sans-serif;
  --font-maru: 'Zen Maru Gothic', sans-serif;
}
body {
  background: var(--bg);
  color: var(--white);
  font-family: var(--font-ja);
  min-height: 100vh;
}
.bg-layer {
  position: fixed; inset: 0; z-index: 0;
}
.bg-layer img {
  width: 100%; height: 100%; object-fit: cover; object-position: center;
  filter: brightness(0.3) saturate(0.8);
}
.bg-layer::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(10,10,26,0.92) 0%, rgba(10,10,26,0.4) 30%, rgba(10,10,26,0.6) 70%, rgba(10,10,26,0.95) 100%);
  z-index: 1;
}
/* ===== HEADER ===== */
.main-header {
  position: relative; z-index: 10;
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 16px;
  background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.15) 100%);
  backdrop-filter: blur(8px); min-height: 54px;
}
.header-left {
  display: flex; align-items: baseline; gap: 8px;
}
.header-names {
  font-family: var(--font-display);
  font-size: clamp(16px, 2.8vw, 30px);
  color: var(--white);
  text-shadow: 0 0 20px rgba(255,215,0,0.15);
  letter-spacing: 1px; line-height: 1;
}
.header-year {
  font-family: var(--font-maru);
  font-size: clamp(9px, 1vw, 12px);
  letter-spacing: 3px; color: var(--gold); opacity: 0.45;
}
.header-nav {
  display: flex; gap: 8px; align-items: center;
}
.header-nav a {
  color: rgba(255,255,255,0.4);
  text-decoration: none;
  font-family: var(--font-maru);
  font-size: 10px;
  letter-spacing: 1px;
  padding: 4px 10px;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 6px;
  transition: all 0.25s;
}
.header-nav a:hover { color: var(--gold); border-color: rgba(255,215,0,0.2); }
.header-nav a.active { color: var(--gold); border-color: rgba(255,215,0,0.3); }
/* ===== MAIN ===== */
main {
  position: relative; z-index: 10;
  max-width: 640px; margin: 0 auto; padding: 12px 12px 24px;
}
.search-box {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
}
.search-box h2 {
  font-family: var(--font-pop);
  font-size: 14px;
  letter-spacing: 1px;
  color: var(--gold);
  margin-bottom: 10px;
}
.search-row {
  display: flex; gap: 8px;
}
.search-row input {
  flex: 1;
  padding: 10px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  color: var(--white);
  font-family: var(--font-maru);
  font-size: 14px;
  outline: none;
  transition: border-color 0.25s;
}
.search-row input:focus { border-color: var(--gold); }
.search-row input::placeholder { color: rgba(255,255,255,0.15); }
.search-row button {
  padding: 10px 20px;
  background: var(--gold);
  border: none;
  border-radius: 10px;
  color: var(--bg);
  font-family: var(--font-pop);
  font-size: 12px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: opacity 0.25s;
  white-space: nowrap;
}
.search-row button:hover { opacity: 0.85; }
.quick-tags {
  display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px;
}
.quick-tags button {
  padding: 4px 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 20px;
  color: rgba(255,255,255,0.35);
  font-family: var(--font-maru);
  font-size: 9px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.25s;
}
.quick-tags button:hover {
  background: rgba(255,215,0,0.08);
  border-color: rgba(255,215,0,0.2);
  color: var(--gold);
}
.city-tabs {
  display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px;
}
.city-tabs button {
  padding: 6px 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  color: rgba(255,255,255,0.35);
  font-family: var(--font-maru);
  font-size: 10px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.25s;
}
.city-tabs button:hover { color: var(--white); border-color: rgba(255,255,255,0.12); }
.city-tabs button.active { background: rgba(255,215,0,0.1); border-color: rgba(255,215,0,0.25); color: var(--gold); }
.results {
  display: none;
}
.results.show { display: block; }
.result-item {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 8px;
}
.result-item .ri-title {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--white);
  margin-bottom: 4px;
}
.result-item .ri-title .item-emoji { margin-right: 6px; }
.result-item .ri-desc {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  line-height: 1.5;
  margin-bottom: 6px;
}
.result-item .ri-meta {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.result-item .ri-meta span {
  font-size: 9px;
  padding: 2px 10px;
  border-radius: 6px;
}
.price-yen {
  background: rgba(255,215,0,0.08);
  color: var(--gold);
}
.price-usd {
  background: rgba(0,229,255,0.08);
  color: var(--cyan);
}
.price-ars {
  background: rgba(255,107,53,0.08);
  color: #ff6b35;
}
.tag-city {
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.4);
}
.result-item .ri-links {
  display: flex; gap: 8px; margin-top: 6px;
}
.result-item .ri-links a {
  font-size: 9px;
  letter-spacing: 1px;
  text-decoration: none;
  opacity: 0.6;
  transition: opacity 0.25s;
}
.result-item .ri-links a:hover { opacity: 1; text-decoration: underline; }
.gmaps-link { color: var(--cyan); }
.web-link { color: rgba(255,255,255,0.5); }
.search-link { color: var(--gold); }
.not-found {
  text-align: center;
  padding: 30px 20px;
  color: rgba(255,255,255,0.15);
  font-size: 11px;
  letter-spacing: 2px;
  line-height: 1.8;
}
.brand-card {
  background: rgba(255,215,0,0.04);
  border: 1px solid rgba(255,215,0,0.12);
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 10px;
}
.brand-card .bc-title {
  font-family: var(--font-pop);
  font-size: 13px;
  color: var(--gold);
  margin-bottom: 12px;
  letter-spacing: 0.5px;
}
.brand-card .bc-links {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.brand-card .bc-links a {
  padding: 8px 16px;
  border-radius: 8px;
  font-family: var(--font-maru);
  font-size: 11px;
  letter-spacing: 1px;
  text-decoration: none;
  transition: all 0.25s;
  flex: 1 0 auto;
  text-align: center;
}
.bc-maps { background: rgba(0,229,255,0.12); color: var(--cyan); }
.bc-maps:hover { background: rgba(0,229,255,0.22); }
.bc-amazon { background: rgba(255,153,0,0.1); color: #ff9900; }
.bc-amazon:hover { background: rgba(255,153,0,0.2); }
.bc-yahoo { background: rgba(255,0,102,0.1); color: #ff0066; }
.bc-yahoo:hover { background: rgba(255,0,102,0.2); }
.bc-google { background: rgba(66,133,244,0.12); color: #4285f4; }
.bc-google:hover { background: rgba(66,133,244,0.22); }
.bc-web { background: rgba(255,255,255,0.05); color: var(--white); }
.bc-web:hover { background: rgba(255,255,255,0.1); }
.brand-card .bc-note {
  margin-top: 10px;
  font-size: 9px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 1px;
  text-align: center;
  line-height: 1.5;
}
.external-search {
  margin-top: 12px;
  padding: 14px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 10px;
}
.external-search p {
  font-size: 10px;
  color: rgba(255,255,255,0.25);
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.external-search .es-links {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.external-search .es-links a {
  padding: 6px 14px;
  border-radius: 8px;
  font-family: var(--font-maru);
  font-size: 10px;
  letter-spacing: 1px;
  text-decoration: none;
  transition: all 0.25s;
}
.es-github { background: rgba(255,255,255,0.05); color: var(--white); }
.es-github:hover { background: rgba(255,255,255,0.1); }
.es-google { background: rgba(66,133,244,0.15); color: #4285f4; }
.es-google:hover { background: rgba(66,133,244,0.25); }
.es-yahoo { background: rgba(255,0,102,0.1); color: #ff0066; }
.es-yahoo:hover { background: rgba(255,0,102,0.2); }
.es-amazon { background: rgba(255,153,0,0.1); color: #ff9900; }
.es-amazon:hover { background: rgba(255,153,0,0.2); }
@media (max-width: 480px) {
  .main-header { padding: 8px 10px; min-height: 48px; }
  main { padding: 8px 8px 16px; }
  .search-row input { font-size: 12px; }
}
</style>

    { item: 'música audio equipo', city: 'Tokyo', title: 'Bic Camera Shinjuku · Audio Section', desc: 'Buena sección de audio. Auriculares, parlantes, micrófonos, interfaces. Shure, Sennheiser, AKG, Audio-Technica, Sony, Focusrite, Yamaha, Pioneer DJ.', price: 15000, unit: '¥1,000–200,000', emoji: '🎧', shop: 'Bic Camera Shinjuku', addr: '3-29-1 Shinjuku, Shinjuku-ku, Tokyo' },
    { item: 'música audio equipo', city: 'Tokyo', title: 'Book Off / Hard Off Shinjuku', desc: 'Ideal para gear usado barato. Auriculares, micrófonos, interfaces, guitarras, pedales, CDs, vinilos. Precios regalados. Shure SM58 usado por ¥3,000.', price: 3000, unit: '¥500–20,000', emoji: '🎛️', shop: 'Book Off Shinjuku', addr: '1-2-5 Shinjuku, Shinjuku-ku, Tokyo' },

    // OSAKA — audio

    { item: 'música audio equipo', city: 'Osaka', title: 'Yamaha Music Osaka (Shinsaibashi)', desc: 'Tienda Yamaha en Shinsaibashi. Sintetizadores, pianos, audio profesional.', price: 20000, unit: '¥3,000–500,000', emoji: '🎹', shop: 'Yamaha Music Osaka', addr: '1-5-7 Shinsaibashisuji, Chuo-ku, Osaka' },
    { item: 'música audio equipo', city: 'Osaka', title: 'Three-Ban Music (Denden Town)', desc: 'Tienda de instrumentos en Denden Town (Nipponbashi). Guitarras, batería, audio. Precios bajos.', price: 15000, unit: '¥2,000–100,000', emoji: '🎸', shop: 'Three-Ban Music Osaka', addr: '3-9 Nipponbashi, Naniwa-ku, Osaka' },

    // KYOTO — audio
    { item: 'música audio equipo', city: 'Kyoto', title: 'Yamaha Music Kyoto', desc: 'Tienda Yamaha cerca de Shijo-dori. Sintetizadores, pianos, audio.', price: 20000, unit: '¥3,000–300,000', emoji: '🎹', shop: 'Yamaha Music Kyoto', addr: 'Shijo-dori, Nakagyo-ku, Kyoto' },
    { item: 'música audio equipo', city: 'Kyoto', title: 'Shimamura Music Kyoto', desc: 'Cadena de instrumentos cerca de Shijo. Guitarras, audio, micrófonos, interfaces.', price: 10000, unit: '¥2,000–100,000', emoji: '🎛️', shop: 'Shimamura Music Kyoto', addr: 'Shijo-dori, Nakagyo-ku, Kyoto' },
  ];

  const $ = id => document.getElementById(id);
  const searchInput = $('searchInput');
  const searchBtn = $('searchBtn');
  const resultsDiv = $('results');
  const resultsList = $('resultsList');
  const quickTags = $('quickTags');
  const cityTabs = $('cityTabs');
  const esLinks = $('esLinks');

  let activeCity = 'Tokyo';

  function init() {
    // Quick tags
    QUICK_ITEMS.forEach(item => {
      const btn = document.createElement('button');
      btn.textContent = item;
      btn.addEventListener('click', () => {
        searchInput.value = item;
        doSearch(item);
      });
      quickTags.appendChild(btn);
    });

    // City tabs
    CITIES.forEach(city => {
      const btn = document.createElement('button');
      btn.textContent = CITY_LABELS[city];
      btn.dataset.city = city;
      if (city === activeCity) btn.classList.add('active');
      btn.addEventListener('click', () => {
        cityTabs.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCity = city;
        const q = searchInput.value.trim();
        doSearch(q);
      });
      cityTabs.appendChild(btn);
    });

    searchBtn.addEventListener('click', () => {
      const q = searchInput.value.trim();
      if (q) doSearch(q);
    });

    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const q = searchInput.value.trim();
        if (q) doSearch(q);
      }
    });

    // Focus search on load
    searchInput.focus();

    // Show all stores in Tokyo by default
    doSearch('');
  }

  const NFD = str => str.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  function toUSD(yen) { return (yen * USD_RATE).toFixed(0); }
  function toARS(yen) { return (yen * ARS_RATE * 140).toFixed(0); }

  function findCategoryFallback(query) {
    const q = NFD(query.toLowerCase());
    const words = q.split(/\s+/).filter(w => w.length > 2);

    const cats = new Set();
    SHOPPING_DATA.forEach(r => {
      const rItem = NFD(r.item);
      words.forEach(w => {
        if (rItem.includes(w)) {
          cats.add(r.item);
        }
      });
    });

    if (cats.size > 0) {
      const allCat = SHOPPING_DATA.filter(r => cats.has(r.item));
      const cityCat = allCat.filter(r => r.city === activeCity);
      return (cityCat.length > 0 ? cityCat : allCat).slice(0, 8);
    }
    return [];
  }

  function doSearch(query) {
    const q = NFD(query.toLowerCase().trim());

    let results;
    if (!q) {
      results = SHOPPING_DATA.filter(r => r.city === activeCity);
    } else {
      const words = q.split(/\s+/).filter(w => w.length > 1);

      results = SHOPPING_DATA.filter(r => {
        const haystack = NFD((r.item + ' ' + r.title + ' ' + r.desc + ' ' + r.shop).toLowerCase());
        if (words.length > 1) {
          return words.every(w => haystack.includes(w));
        }
        return haystack.includes(q);
      });

      const cityResults = results.filter(r => r.city === activeCity);
      results = cityResults.length > 0 ? cityResults : results;
    }

    renderResults(results, query);

    const encQuery = encodeURIComponent(query);
    const encCity = encodeURIComponent(activeCity);
    esLinks.innerHTML = ''
      + '<a href="https://www.google.com/maps/search/' + encQuery + '+' + encCity + '+japan" target="_blank" class="es-github">📍 Maps — ' + activeCity + '</a>'
      + '<a href="https://www.google.com/search?tbm=shop&q=' + encQuery + '+japan" target="_blank" class="es-google">🛒 Google Shopping</a>'
      + '<a href="https://www.amazon.co.jp/s?k=' + encQuery + '" target="_blank" class="es-amazon">📦 Amazon Japón</a>'
      + '<a href="https://shopping.yahoo.co.jp/search?p=' + encQuery + '" target="_blank" class="es-yahoo">🛍️ Yahoo Shopping JP</a>'
      + '<a href="https://www.google.com/search?q=' + encQuery + '+japan+tokyo+donde+comprar" target="_blank" class="es-github">🌐 Dónde comprar en Japón</a>';

    resultsDiv.classList.add('show');
  }

  function renderResults(results, query) {
    const encQuery = encodeURIComponent(query);
    const encCity = encodeURIComponent(activeCity);

    if (results.length === 0) {
      const catFallback = findCategoryFallback(query);

      let html = '';

      // Brand search card: always show for specific queries
      html += '<div class="brand-card">'
        + '<div class="bc-title">🔍 ¿Dónde comprar "' + query + '" en ' + activeCity + '?</div>'
        + '<div class="bc-links">'
        + '<a href="https://www.google.com/maps/search/' + encQuery + '+' + encCity + '+japan" target="_blank" class="bc-maps">📍 Ver tiendas en Maps</a>'
        + '<a href="https://www.amazon.co.jp/s?k=' + encQuery + '" target="_blank" class="bc-amazon">📦 Amazon Japón</a>'
        + '<a href="https://shopping.yahoo.co.jp/search?p=' + encQuery + '" target="_blank" class="bc-yahoo">🛍️ Yahoo Shopping JP</a>'
        + '<a href="https://www.google.com/search?tbm=shop&q=' + encQuery + '+japan" target="_blank" class="bc-google">🛒 Google Shopping</a>'
        + '<a href="https://www.google.com/search?q=' + encQuery + '+japan+' + encCity + '+tienda" target="_blank" class="bc-web">🌐 Búsqueda general</a>'
        + '</div>'
        + '<div class="bc-note">💡 No tenemos "' + query + '" en nuestra guía, pero estos links te llevan directo a donde comprarla online o ver tiendas físicas en Maps</div>'
        + '</div>';

      if (catFallback.length > 0) {
        html += '<div style="margin:12px 0 8px;font-size:10px;letter-spacing:1px;color:rgba(255,215,0,0.35);text-align:center;">⬇️ Mientras tanto, categorías relacionadas en ' + activeCity + ':</div>';
        catFallback.forEach(r => {
          const mapsQuery = encodeURIComponent(r.shop + ', ' + r.addr);
          const usd = toUSD(r.price);
          html += '<div class="result-item">'
            + '<div class="ri-title"><span class="item-emoji">' + r.emoji + '</span>' + r.title + '</div>'
            + '<div class="ri-desc">' + r.desc + '</div>'
            + '<div class="ri-meta">'
            + '<span class="price-yen">¥ ' + r.unit + '</span>'
            + '<span class="price-usd">US$ ~' + usd + '</span>'
            + '<span class="tag-city">' + CITY_LABELS[r.city] + '</span>'
            + '</div>'
            + '<div class="ri-links">'
            + '<a href="https://www.google.com/maps?q=' + mapsQuery + '" target="_blank" class="gmaps-link">📍 Maps</a>'
            + '</div></div>';
        });
      }

      resultsList.innerHTML = html;
      return;
    }

    let html = '';
    results.forEach(r => {
      const yen = r.price;
      const usd = toUSD(yen);
      const ars = toARS(yen);
      const mapsQuery = encodeURIComponent(r.shop + ', ' + r.addr);
      html += '<div class="result-item">'
        + '<div class="ri-title">'
        + '<span class="item-emoji">' + r.emoji + '</span>' + r.title
        + '</div>'
        + '<div class="ri-desc">' + r.desc + '</div>'
        + '<div class="ri-meta">'
        + '<span class="price-yen">¥ ' + r.unit + '</span>'
        + '<span class="price-usd">US$ ~' + usd + '</span>'
        + '<span class="tag-city">' + CITY_LABELS[r.city] + '</span>'
        + '</div>'
        + '<div class="ri-links">'
        + '<a href="https://www.google.com/maps?q=' + mapsQuery + '" target="_blank" class="gmaps-link">📍 Maps</a>'
        + '<a href="https://www.google.com/search?q=' + encodeURIComponent(r.shop + ' ' + r.city + ' shopping') + '" target="_blank" class="search-link">🔍 Buscar</a>'
        + '</div>'
        + '</div>';
    });
    resultsList.innerHTML = html;
  }

  init();
})();
</script>
